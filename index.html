<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Mobile UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="phone">

    <div class="status-bar">
        <span>9:41</span>
        <div class="icons">
            <span>📶</span>
            <span>📡</span>
            <span>🔋</span>
        </div>
    </div>

    <div class="header">
        <h2>Hello, Varshan</h2>
        <p>Good Evening</p>
    </div>

    <div class="search">
        <input type="text" placeholder="Search...">
    </div>

    <div class="cards">

        <div class="card">
            <h3>Projects</h3>
            <p>12 Active</p>
        </div>

        <div class="card">
            <h3>Tasks</h3>
            <p>8 Remaining</p>
        </div>

        <div class="card">
            <h3>Messages</h3>
            <p>5 New</p>
        </div>

        <div class="card">
            <h3>Profile</h3>
            <p>View Details</p>
        </div>

    </div>

    <div class="bottom-nav">

        <div class="nav active">
            🏠
            <small>Home</small>
        </div>

        <div class="nav">
            📁
            <small>Files</small>
        </div>

        <div class="nav">
            ❤️
            <small>Favorites</small>
        </div>

        <div class="nav">
            ⚙️
            <small>Settings</small>
        </div>

    </div>

</div>

</body>
</html>
